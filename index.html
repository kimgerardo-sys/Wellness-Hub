<script>
        // CONFIGURACIÓN CLOUD
        const CLOUD_URL = "https://script.google.com/macros/s/AKfycbxw9MinZFHWrLN1tXLJyPB4JV-1xcnI2cirNW50dK7jR0VMxSy_AEPuSZ-k8dAFxUmd/exec";
        let localData = [];

        async function loadCloudData() {
            try {
                const response = await fetch(CLOUD_URL);
                const rawData = await response.json();
                
                // Normalización de datos (Doc #9)
                localData = rawData.map(item => {
                    let newItem = {};
                    for (let key in item) { newItem[key.toLowerCase().trim()] = item[key]; }
                    return newItem;
                });
                
                render(localData);
            } catch (error) {
                console.error("Error:", error);
            }
        }

        function render(data) {
            const grid = document.getElementById('itemsGrid');
            grid.innerHTML = data.map((item, index) => `
                <div class="bg-white rounded-[2.5rem] overflow-hidden card-shadow animate-fade border border-slate-50 mb-4">
                    <div class="relative h-64">
                        <img src="${item.imagen || 'https://images.unsplash.com/photo-1540555700478-4be289fbecef?w=800'}" 
                             class="w-full h-full object-cover">
                        <div class="absolute top-4 right-4 bg-white/90 backdrop-blur-md px-4 py-1.5 rounded-full text-sm font-black text-emerald-700 shadow-sm">
                            ${item.precio || 'Consultar'}
                        </div>
                    </div>
                    <div class="p-6">
                        <div class="flex items-center gap-2 mb-2">
                            <span class="text-[10px] font-black text-emerald-600 uppercase tracking-widest bg-emerald-50 px-2 py-0.5 rounded-md">
                                ${item.categoria || 'Wellness'}
                            </span>
                        </div>
                        <h3 class="text-2xl font-bold text-slate-800 mb-1 leading-tight">${item.nombre}</h3>
                        <p class="text-slate-500 font-medium flex items-center gap-1.5 mb-6">
                            <i data-lucide="map-pin" class="w-4 h-4 text-emerald-500"></i> ${item.proveedor}
                        </p>
                        
                        <div class="grid grid-cols-2 gap-3">
                            <a href="${item.ubicacion || 'https://www.google.com/maps/search/San+Carlos+Sonora'}" target="_blank" 
                               class="flex items-center justify-center gap-2 bg-slate-100 text-slate-700 p-4 rounded-2xl font-bold active:scale-95 transition-all">
                                <i data-lucide="navigation" class="w-5 h-5"></i>
                                <span>Mapa</span>
                            </a>
                            
                            <a href="${item.link || '#'}" target="_blank" 
                               class="flex items-center justify-center gap-2 bg-emerald-600 text-white p-4 rounded-2xl font-bold active:scale-95 transition-all shadow-lg shadow-emerald-100">
                                <i data-lucide="message-circle" class="w-5 h-5"></i>
                                <span>Contacto</span>
                            </a>
                        </div>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        // Funciones para los botones de abajo (Navegación)
        function showTab(tab) {
            if(tab === 'explorar') {
                loadCloudData(); // Recarga la lista
                window.scrollTo({top: 0, behavior: 'smooth'});
            } else if(tab === 'mapa') {
                // Abre Google Maps de San Carlos Sonora por defecto
                window.open('https://www.google.com/maps/search/Wellness+Spa+San+Carlos+Sonora', '_blank');
            } else if(tab === 'perfil') {
                alert("Próximamente: Panel de Negocios para San Carlos.");
            }
        }

        window.onload = loadCloudData;
    </script>

    <nav class="fixed bottom-6 left-6 right-6 h-20 glass rounded-3xl shadow-2xl flex justify-around items-center px-4 border border-white/50">
        <button onclick="showTab('explorar')" class="flex flex-col items-center text-emerald-600"><i data-lucide="sparkles"></i><span class="text-[10px] font-bold mt-1">Explorar</span></button>
        <button onclick="showTab('mapa')" class="flex flex-col items-center text-slate-400"><i data-lucide="map"></i><span class="text-[10px] font-bold mt-1">Mapa Gral.</span></button>
        <button onclick="showTab('perfil')" class="flex flex-col items-center text-slate-400"><i data-lucide="user"></i><span class="text-[10px] font-bold mt-1">Negocios</span></button>
    </nav>
